name: Nightly E2E - Staging

on:
  schedule:
    - cron: '30 20 * * *'   # 2:00 AM IST
  workflow_dispatch:

jobs:
  playwright:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --dir e2e exec playwright install --with-deps

      - name: Run E2E Tests Against Staging
        run: pnpm --dir e2e test-e2e
        env:
          BASE_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          TEST_STUDENT_EMAIL: ${{ secrets.TEST_STUDENT_EMAIL }}
          TEST_STUDENT_PASSWORD: ${{ secrets.TEST_STUDENT_PASSWORD }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/